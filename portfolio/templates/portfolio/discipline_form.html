{% extends "../base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">{{ action }} Discipline</h2>
  <a href="{% url 'disciplines' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fa-solid fa-arrow-left me-1"></i> Back
  </a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      {% csrf_token %}

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Course</label>
          <select name="course" class="form-select" required>
            <option value="">-- Select a course --</option>
            {% for course in courses %}
            <option value="{{ course.id }}" {% if discipline.Course.id == course.id %}selected{% endif %}>
              {{ course.name }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Code</label>
          <input type="text" name="code" class="form-control" value="{{ discipline.code }}" required>
        </div>

        <div class="col-md-3">
          <label class="form-label">ECTS</label>
          <input type="number" name="ects" class="form-control" value="{{ discipline.ects }}" required>
        </div>

        <div class="col-md-8">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" value="{{ discipline.name }}" required>
        </div>

        <div class="col-md-4">
          <label class="form-label">Final Grade</label>
          <input type="number" name="finalgrade" class="form-control" step="0.01" value="{{ discipline.finalgrade }}">
        </div>

        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ discipline.description }}</textarea>
        </div>

        <div class="col-md-4">
          <label class="form-label">Background Color</label>
          <div class="input-group">
            <input type="color" name="background_color" class="form-control form-control-color"
              value="{{ discipline.background_color|default:'#ffffff' }}">
            <input type="text" name="background_color_text" class="form-control"
              value="{{ discipline.background_color }}" placeholder="#ffffff">
          </div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Text Color</label>
          <div class="input-group">
            <input type="color" name="text_color" class="form-control form-control-color"
              value="{{ discipline.text_color|default:'#000000' }}">
            <input type="text" name="text_color_text" class="form-control"
              value="{{ discipline.text_color }}" placeholder="#000000">
          </div>
        </div>

        <div class="col-md-4">
        <label class="form-label">Icon</label>
        <div class="input-group mb-2">
            <span class="input-group-text"><i id="icon-preview" class="{{ discipline.icon|default:'fa-solid fa-book' }}"></i></span>
            <input type="text" name="icon" id="icon-input" class="form-control"
            value="{{ discipline.icon }}" placeholder="fa-solid fa-book" readonly>
        </div>
        <input type="text" id="icon-search" class="form-control mb-2" placeholder="Search icons...">
        <div id="icon-grid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; max-height: 200px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px;">
        </div>
        <small class="text-secondary">Click an icon to select it.</small>
        </div>

      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-save me-1"></i> Save
        </button>
        <a href="{% url 'disciplines' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
  // Sync color picker with text input
  document.querySelector('input[name="background_color"]').addEventListener('input', function() {
    document.querySelector('input[name="background_color_text"]').value = this.value;
  });
  document.querySelector('input[name="text_color"]').addEventListener('input', function() {
    document.querySelector('input[name="text_color_text"]').value = this.value;
  });

  // Live icon preview
  document.getElementById('icon-input').addEventListener('input', function() {
    document.getElementById('icon-preview').className = this.value;
  });

    const ICONS = [
    'fa-solid fa-book', 'fa-solid fa-laptop-code', 'fa-solid fa-code',
    'fa-solid fa-database', 'fa-solid fa-network-wired', 'fa-solid fa-brain',
    'fa-solid fa-calculator', 'fa-solid fa-chart-bar', 'fa-solid fa-chart-line',
    'fa-solid fa-flask', 'fa-solid fa-globe', 'fa-solid fa-lock',
    'fa-solid fa-microchip', 'fa-solid fa-mobile-screen', 'fa-solid fa-pen',
    'fa-solid fa-project-diagram', 'fa-solid fa-robot', 'fa-solid fa-server',
    'fa-solid fa-shield-halved', 'fa-solid fa-sitemap', 'fa-solid fa-terminal',
    'fa-solid fa-wifi', 'fa-solid fa-wrench', 'fa-solid fa-puzzle-piece',
    'fa-solid fa-graduation-cap', 'fa-solid fa-chalkboard-teacher',
    'fa-solid fa-diagram-project', 'fa-solid fa-file-code', 'fa-solid fa-gears',
    'fa-solid fa-hard-drive', 'fa-solid fa-keyboard', 'fa-solid fa-layer-group',
    'fa-solid fa-magnifying-glass', 'fa-solid fa-memory', 'fa-solid fa-pen-ruler',
    'fa-solid fa-plug', 'fa-solid fa-satellite', 'fa-solid fa-table',
    'fa-solid fa-tower-broadcast', 'fa-solid fa-user-gear', 'fa-solid fa-windows',
    'fa-brands fa-python', 'fa-brands fa-js', 'fa-brands fa-html5',
    'fa-brands fa-css3-alt', 'fa-brands fa-git-alt', 'fa-brands fa-github',
    'fa-brands fa-docker', 'fa-brands fa-linux', 'fa-brands fa-react',
    'fa-brands fa-bootstrap', 'fa-brands fa-django', 'fa-brands fa-java',
    ];

    function renderIcons(filter = '') {
    const grid = document.getElementById('icon-grid');
    const filtered = ICONS.filter(i => i.includes(filter.toLowerCase()));
    grid.innerHTML = filtered.map(icon => `
        <div onclick="selectIcon('${icon}')" title="${icon}"
        style="display:flex; align-items:center; justify-content:center; padding:8px; border-radius:6px; cursor:pointer; border: 1px solid #dee2e6;"
        onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background=''">
        <i class="${icon}"></i>
        </div>
    `).join('');
    }

    function selectIcon(icon) {
    document.getElementById('icon-input').value = icon;
    document.getElementById('icon-preview').className = icon;
    }

    document.getElementById('icon-search').addEventListener('input', function() {
    renderIcons(this.value);
    });

    renderIcons();

</script>
{% endblock %}
